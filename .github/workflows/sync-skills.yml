name: Sync skills from upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream skills
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/obra/superpowers.git /tmp/superpowers
          cd /tmp/superpowers
          git sparse-checkout set skills

      - name: Copy skills
        run: |
          rsync -av --delete /tmp/superpowers/skills/ src/agent_superpowers/skills/

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/agent_superpowers/skills/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Bump patch version
        if: steps.diff.outputs.changed == 'true'
        run: |
          python - <<'EOF'
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          text = p.read_text()
          ver = re.search(r'version = "(\d+\.\d+\.)(\d+)"', text)
          new = str(int(ver.group(2)) + 1)
          p.write_text(text.replace(ver.group(0), f'version = "{ver.group(1)}{new}"'))
          EOF

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync skills from obra/superpowers"
          title: "chore: sync skills from upstream"
          branch: sync/skills-upstream
          body: "Automated sync of skills from obra/superpowers. Version bumped."
