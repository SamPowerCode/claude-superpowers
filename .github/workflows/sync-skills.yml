name: Sync superpowers from upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch upstream superpowers
        run: |
          git clone --depth=1 https://github.com/obra/superpowers.git /tmp/superpowers

      - name: Sync superpowers directory
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            /tmp/superpowers/ src/agent_superpowers/superpowers/

      - name: Regenerate Copilot-adapted variant
        run: python scripts/regenerate_copilot.py

      - name: Check for changes
        id: diff
        run: |
          git add src/agent_superpowers/superpowers/ src/agent_superpowers/superpowers-copilot/
          git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Bump minor version
        if: steps.diff.outputs.changed == 'true'
        run: |
          python - <<'EOF'
          import re, pathlib

          # pyproject.toml
          p = pathlib.Path("pyproject.toml")
          text = p.read_text()
          m = re.search(r'version = "(\d+)\.(\d+)\.(\d+)"', text)
          new_ver = f'{m.group(1)}.{int(m.group(2)) + 1}.0'
          p.write_text(text.replace(m.group(0), f'version = "{new_ver}"'))

          # __init__.py
          i = pathlib.Path("src/agent_superpowers/__init__.py")
          i.write_text(re.sub(r'__version__ = "[^"]+"', f'__version__ = "{new_ver}"', i.read_text()))

          print(f"Bumped to {new_ver}")
          EOF

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync superpowers from obra/superpowers"
          title: "chore: sync superpowers from upstream"
          branch: sync/superpowers-upstream
          body: |
            Automated sync of obra/superpowers content.

            Changes:
            - `superpowers/` synced from upstream
            - `superpowers-copilot/` regenerated via `scripts/regenerate_copilot.py`
            - Minor version bumped

            If `regenerate_copilot.py` reported warnings, check the step output and update the script if upstream skill content changed.
